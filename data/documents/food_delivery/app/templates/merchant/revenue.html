{% extends "base.html" %}
{% block title %}营收统计 - 外卖配送系统{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4"><i class="bi bi-graph-up-arrow"></i> 营收统计</h1>

    <!-- Period Filter -->
    <div class="card mb-4">
        <div class="card-body py-2">
            <div class="d-flex gap-2">
                <a href="{{ url_for('merchant.revenue', period='today') }}" class="btn btn-sm {{ 'btn-primary' if period == 'today' else 'btn-outline-secondary' }}">
                    今天
                </a>
                <a href="{{ url_for('merchant.revenue', period='week') }}" class="btn btn-sm {{ 'btn-primary' if period == 'week' else 'btn-outline-secondary' }}">
                    本周
                </a>
                <a href="{{ url_for('merchant.revenue', period='month') }}" class="btn btn-sm {{ 'btn-primary' if period == 'month' else 'btn-outline-secondary' }}">
                    本月
                </a>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card text-center border-success h-100">
                <div class="card-body">
                    <div class="text-muted mb-2">总营收</div>
                    <div class="display-4 text-success fw-bold">¥{{ "%.2f"|format(total_revenue) }}</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card text-center border-primary h-100">
                <div class="card-body">
                    <div class="text-muted mb-2">订单总数</div>
                    <div class="display-4 text-primary fw-bold">{{ order_count }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Shop Total Sales -->
    {% if shop and shop.total_sales %}
    <div class="card mt-4">
        <div class="card-body text-center">
            <div class="text-muted mb-1">店铺累计销量</div>
            <div class="fs-3 fw-bold">{{ shop.total_sales }} 单</div>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
